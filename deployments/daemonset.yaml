apiVersion: v1
kind: ServiceAccount
metadata:
  name: mock-nvidia-device-plugin
  namespace: kube-system
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRole
metadata:
  name: mock-nvidia-device-plugin
rules:
  - apiGroups: [""]
    resources: ["nodes"]
    verbs: ["get", "patch"]
---
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: mock-nvidia-device-plugin
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: mock-nvidia-device-plugin
subjects:
  - kind: ServiceAccount
    name: mock-nvidia-device-plugin
    namespace: kube-system
---
apiVersion: apps/v1
kind: DaemonSet
metadata:
  name: mock-nvidia-device-plugin
  namespace: kube-system
spec:
  selector:
    matchLabels:
      app: mock-nvidia-device-plugin
  template:
    metadata:
      labels:
        app: mock-nvidia-device-plugin
    spec:
      serviceAccountName: mock-nvidia-device-plugin
      affinity:
        nodeAffinity:
          requiredDuringSchedulingIgnoredDuringExecution:
            nodeSelectorTerms:
              - matchExpressions:
                  - key: node-role.kubernetes.io/control-plane
                    operator: DoesNotExist
      tolerations:
        - operator: Exists
      containers:
        - name: plugin
          image: ghcr.io/julsemaan/mock-nvidia-gpu-device-plugin:latest
          imagePullPolicy: Always
          args:
            - --resource-name=nvidia.com/gpu
            - --device-count=1
            - --node-name=$(NODE_NAME)
          securityContext:
            privileged: true
            readOnlyRootFilesystem: true
          env:
            - name: NODE_NAME
              valueFrom:
                fieldRef:
                  fieldPath: spec.nodeName
          resources:
            requests:
              cpu: 25m
              memory: 32Mi
            limits:
              cpu: 100m
              memory: 128Mi
          volumeMounts:
            - name: device-plugin
              mountPath: /var/lib/kubelet/device-plugins
      volumes:
        - name: device-plugin
          hostPath:
            path: /var/lib/kubelet/device-plugins
            type: Directory
